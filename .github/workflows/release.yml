name: Release

on:
  release:
    types: [published]
    
permissions:
  contents: write
  
env:
  CARGO_TERM_COLOR: always
  GH_TOKEN: ${{ github.token }}

jobs:
  prepare:
    name: Prepare release metadata
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Extract version from tag
        id: version
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${TAG#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

  release:
    strategy:
      matrix:
        platform: 
          - os_name: Windows-x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            bin: gbscraper.exe
            final: gbscraper-windows-x86_64.zip
          - os_name: Windows-i686
            os: windows-latest
            target: i686-pc-windows-msvc
            bin: gbscraper.exe
            final: gbscraper-windows-i686.zip
          - os_name: Windows-aarch64
            os: windows-latest
            target: aarch64-pc-windows-msvc
            bin: gbscraper.exe
            final: gbscraper-windows-aarch64.zip
          - os_name: macOS-x86_64
            os: macOS-latest
            target: x86_64-apple-darwin
            bin: gbscraper
            final: gbscraper-apple-darwin-x86_64.tar.gz
          - os_name: macOS-aarch64
            os: macOS-latest
            target: aarch64-apple-darwin
            bin: gbscraper
            final: gbscraper-apple-darwin-aarch64.tar.gz
          - os_name: Linux-x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bin: gbscraper
            final: gbscraper-linux-x86_64.tar.gz
          # - os_name: Linux-i686
          #   os: ubuntu-latest
          #   target: i686-unknown-linux-gnu
          #   bin: gbscraper
          #   final: gbscraper-linux-i686.tar.gz
    runs-on: ${{ matrix.platform.os }}
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Build - ${{ matrix.platform.os_name }}
      run: |
        rustup target add ${{matrix.platform.target}}
        cargo build --release --target ${{ matrix.platform.target }}
    - name: Archive prep
      run: |
        mkdir publish
        cp README.md publish
        cp LICENSE-APACHE publish
        cp LICENSE-MIT publish
        cp attribution.txt publish
        mv target/${{ matrix.platform.target }}/release/${{ matrix.platform.bin }} publish
    - name: Archive (.zip)
      if: matrix.platform.os == 'windows-latest'
      run: |
        cd publish
        7z a ../${{ matrix.platform.final }} *
    - name: Archive (.tar.gz)
      if: matrix.platform.os != 'windows-latest'
      run: |
        cd publish
        tar cvzf ../${{ matrix.platform.final }} *
    - name: Release
      run:
        gh release upload ${{ github.event.release.tag_name }} ${{ matrix.platform.final }}

  homebrew-macos-arm64:
    name: Publish gbscraper to Homebrew tap (macOS arm64)
    runs-on: macos-14
    needs: prepare

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - name: Install Rust (stable, aarch64-apple-darwin)
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache Cargo registry
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Stamp version into Cargo.toml
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          sed -i '' "s/^version = .*/version = \"${VERSION}\"/" Cargo.toml

      - name: Build release binary
        run: cargo build --release --target aarch64-apple-darwin

      - name: Package binary
        id: package
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          TARBALL="gbscraper-${VERSION}-aarch64-apple-darwin.tar.gz"
          tar -czf "$TARBALL" -C target/aarch64-apple-darwin/release gbscraper
          SHA256=$(shasum -a 256 "$TARBALL" | awk '{print $1}')
          echo "tarball=$TARBALL" >> "$GITHUB_OUTPUT"
          echo "sha256=$SHA256"   >> "$GITHUB_OUTPUT"

      - name: Generate Homebrew tap token
        id: tap-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v1
        with:
          app-id:      ${{ secrets.TAP_APP_ID }}
          private-key: ${{ secrets.TAP_APP_PRIVATE_KEY }}
          owner:       shloop
          repositories: homebrew-tap

      - name: Publish binary to homebrew-tap and update formula
        env:
          GH_TOKEN: ${{ steps.tap-token.outputs.token }}
          VERSION:  ${{ needs.prepare.outputs.version }}
          SHA256:   ${{ steps.package.outputs.sha256 }}
          TARBALL:  ${{ steps.package.outputs.tarball }}
        run: |
          gh release create "gbscraper/${VERSION}" \
            --repo shloop/homebrew-tap \
            --title "gbscraper ${VERSION}" \
            --notes "gbscraper ${VERSION} — macOS ARM64 binary" \
            "${TARBALL}"

          URL="https://github.com/shloop/homebrew-tap/releases/download/gbscraper%2F${VERSION}/${TARBALL}"

          git clone \
            "https://x-access-token:${GH_TOKEN}@github.com/shloop/homebrew-tap.git" \
            tap-repo

          mkdir -p tap-repo/Formula

          cat > tap-repo/Formula/gbscraper.rb << 'FORMULAEOF'
          # This file is auto-generated by GitHub Actions.
          # Do not edit by hand — it will be overwritten on the next build.
          class Gbscraper < Formula
            desc "Tool for downloading Google Books content for offline viewing as PDF or CBZ"
            homepage "https://github.com/shloop/google-book-scraper"
            version "VERSION_PLACEHOLDER"
            license "MIT"

            on_arm do
              url "URL_PLACEHOLDER"
              sha256 "SHA256_PLACEHOLDER"
            end

            def install
              bin.install "gbscraper"
            end

            test do
              assert_predicate bin/"gbscraper", :executable?
            end
          end
          FORMULAEOF

          sed -i '' \
            -e "s|VERSION_PLACEHOLDER|${VERSION}|" \
            -e "s|URL_PLACEHOLDER|${URL}|" \
            -e "s|SHA256_PLACEHOLDER|${SHA256}|" \
            tap-repo/Formula/gbscraper.rb

          cd tap-repo
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/gbscraper.rb
          git commit -m "gbscraper: update to ${VERSION}"
          git push