name: Release

on:
  release:
    types: [published]
    
permissions:
  contents: write
  
env:
  CARGO_TERM_COLOR: always
  GH_TOKEN: ${{ github.token }}
  # VERSION: ${{ github.ref_name }}
  VERSION: ${{ github.event.release.tag_name }}

jobs:

  build:
    name: Build binaries and upload to release
    strategy:
      matrix:
        platform: 
          - os_name: Windows-x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            bin: gbscraper.exe
            final: "google-book-scraper-${VERSION#v}-windows-amd64.zip"
          - os_name: Windows-i686
            os: windows-latest
            target: i686-pc-windows-msvc
            bin: gbscraper.exe
            final: "google-book-scraper-${VERSION#v}-windows-i686.zip"
          - os_name: Windows-aarch64
            os: windows-latest
            target: aarch64-pc-windows-msvc
            bin: gbscraper.exe
            final: "google-book-scraper-${VERSION#v}-windows-arm64.zip"
          - os_name: macOS-x86_64
            os: macOS-latest
            target: x86_64-apple-darwin
            bin: gbscraper
            final: "google-book-scraper-${VERSION#v}-darwin-amd64.tar.gz"
          - os_name: macOS-aarch64
            os: macOS-latest
            target: aarch64-apple-darwin
            bin: gbscraper
            final: "google-book-scraper-${VERSION#v}-darwin-arm64.tar.gz"
          - os_name: Linux-x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bin: gbscraper
            final: "google-book-scraper-${VERSION#v}-linux-amd64.tar.gz"
          # - os_name: Linux-i686
          #   os: ubuntu-latest
          #   target: i686-unknown-linux-gnu
          #   bin: gbscraper
          #   final:  "google-book-scraper-$VERSION-linux-i686.tar.gz"
          - os_name: Linux-aarch64
            os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            bin: gbscraper
            final: "google-book-scraper-$VERSION-linux-arm64.tar.gz"
    runs-on: ${{ matrix.platform.os }}
    steps:
    - name: Checkout
      uses: actions/checkout@v6
    - name: Build - ${{ matrix.platform.os_name }}
      run: |
        rustup target add ${{ matrix.platform.target }}
        cargo build --release --target ${{ matrix.platform.target }}
    - name: Archive prep
      run: |
        mkdir publish
        cp README.md publish
        cp LICENSE-APACHE publish
        cp LICENSE-MIT publish
        cp attribution.txt publish
        mv target/${{ matrix.platform.target }}/release/${{ matrix.platform.bin }} publish
    - name: Archive (.zip)
      if: matrix.platform.os == 'windows-latest'
      run: |
        cd publish
        7z a ../${{ matrix.platform.final }} *
    - name: Archive (.tar.gz)
      if: matrix.platform.os != 'windows-latest'
      run: |
        cd publish
        tar cvzf ../${{ matrix.platform.final }} *
    - name: Release
      run:
        gh release upload ${{ github.event.release.tag_name }} ${{ matrix.platform.final }}

  publish_crate:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    # environment: release  # Optional: for enhanced security
    permissions:
      id-token: write
    steps:
    - uses: actions/checkout@v6
    - uses: rust-lang/crates-io-auth-action@v1
      id: auth
    - run: cargo publish
      env:
        CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

  homebrew-releaser:
    runs-on: ubuntu-latest
    needs: build
    name: homebrew-releaser
    steps:
      - name: Release project to Homebrew tap
        uses: Justintime50/homebrew-releaser@v3
        with:
          # The name of the homebrew tap to publish your formula to as it appears on GitHub (Homebrew taps must start with `homebrew-`).
          # Required - strings
          homebrew_owner: shloop
          homebrew_tap: homebrew-tap

          # The Personal Access Token (saved as a repo secret) that has `repo` permissions for the repo running the action AND Homebrew tap you want to release to.
          # Required - string
          github_token: ${{ secrets.TAP_TOKEN }}

          target_darwin_amd64: true
          target_darwin_arm64: true
          target_linux_amd64: true
          target_linux_arm64: true
          
          # Install command for your formula.
          # Required - string
          install: 'bin.install "gbscraper"'

          update_readme_table: true